name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/nextflow-monitor-linux-amd64   ./cmd
          GOOS=darwin  GOARCH=amd64 go build -o dist/nextflow-monitor-darwin-amd64   ./cmd
          GOOS=darwin  GOARCH=arm64 go build -o dist/nextflow-monitor-darwin-arm64   ./cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
