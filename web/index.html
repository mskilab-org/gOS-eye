<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nextflow-monitor</title>
    <link rel="stylesheet" href="/static/style.css">
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js"></script>
    <script>
        // Format elapsed time from an ISO start-time string to "Xh Ym Zs".
        // If completeTime is provided and non-empty, use it as the end (frozen timer).
        // Otherwise use Date.now() (live timer).
        window.formatElapsed = function(startTime, completeTime) {
            var start = new Date(startTime).getTime();
            if (isNaN(start)) return '';
            var end = (completeTime && completeTime !== '') ? new Date(completeTime).getTime() : Date.now();
            if (isNaN(end)) end = Date.now();
            var ms = end - start;
            if (ms < 0) ms = 0;
            var totalSec = Math.floor(ms / 1000);
            var h = Math.floor(totalSec / 3600);
            var m = Math.floor((totalSec % 3600) / 60);
            var s = totalSec % 60;
            if (h > 0) return h + 'h ' + m + 'm ' + s + 's';
            if (m > 0) return m + 'm ' + s + 's';
            return s + 's';
        };

        // Returns true when a DAG node should be faded (dimmed) during hover.
        // hl: current highlight value (_dagHL signal)
        // name: this node's process name
        // neighbors: array of connected node names (parents + children)
        window.dagShouldFade = function(hl, name, neighbors) {
            if (hl === '') return false;
            if (hl.indexOf('>') !== -1) {
                var parts = hl.split('>');
                return name !== parts[0] && name !== parts[1];
            }
            return name !== hl && neighbors.indexOf(hl) === -1;
        };

        // Returns true when a DAG edge should be faded during hover.
        // hl: current highlight value (_dagHL signal)
        // from: edge source node name
        // to: edge target node name
        window.dagEdgeFade = function(hl, from, to) {
            if (hl === '') return false;
            if (hl.indexOf('>') !== -1) {
                return hl !== from + '>' + to;
            }
            return from !== hl && to !== hl;
        };

        // Copy text to clipboard with visual feedback (icon swap via .copied class).
        // btn: the button element, text: string to copy.
        window.copyText = function(btn, text) {
            navigator.clipboard.writeText(text).then(function() {
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.classList.remove('copied');
                }, 1500);
            });
        };

        // ---- Samplesheet undo/redo ----
        var ssUndoStack = [];
        var ssRedoStack = [];

        function syncSamplesheetInputs() {
            var table = document.getElementById('samplesheet-table');
            if (!table) return;
            var inputs = table.querySelectorAll('input[type="text"]');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].setAttribute('value', inputs[i].value);
            }
        }

        function updateSsButtonStates() {
            var undoBtn = document.querySelector('.btn-ss-undo');
            var redoBtn = document.querySelector('.btn-ss-redo');
            if (undoBtn) undoBtn.disabled = ssUndoStack.length === 0;
            if (redoBtn) redoBtn.disabled = ssRedoStack.length === 0;
        }

        function snapshotSamplesheet() {
            var tbody = document.querySelector('#samplesheet-table tbody');
            if (!tbody) return;
            syncSamplesheetInputs();
            ssUndoStack.push(tbody.innerHTML);
            ssRedoStack = [];
            if (ssUndoStack.length > 50) ssUndoStack.shift();
            updateSsButtonStates();
        }

        window.undoSamplesheet = function() {
            var tbody = document.querySelector('#samplesheet-table tbody');
            if (!tbody || ssUndoStack.length === 0) return;
            syncSamplesheetInputs();
            ssRedoStack.push(tbody.innerHTML);
            tbody.innerHTML = ssUndoStack.pop();
            updateSsButtonStates();
        };

        window.redoSamplesheet = function() {
            var tbody = document.querySelector('#samplesheet-table tbody');
            if (!tbody || ssRedoStack.length === 0) return;
            syncSamplesheetInputs();
            ssUndoStack.push(tbody.innerHTML);
            tbody.innerHTML = ssRedoStack.pop();
            updateSsButtonStates();
        };

        // Remove a row from the samplesheet table.
        window.removeSamplesheetRow = function(btn) {
            var tr = btn.closest('tr');
            if (!tr) return;
            snapshotSamplesheet();
            tr.remove();
        };

        // Copy samplesheet table contents as CSV to clipboard.
        // btn: the button element (evt.target).
        window.copySamplesheet = function(btn) {
            var table = document.getElementById('samplesheet-table');
            if (!table) return;

            function csvEscape(val) {
                if (val.indexOf(',') !== -1 || val.indexOf('"') !== -1 || val.indexOf('\n') !== -1) {
                    return '"' + val.replace(/"/g, '""') + '"';
                }
                return val;
            }

            var headers = [];
            var ths = table.querySelectorAll('thead th:not(.col-actions)');
            for (var i = 0; i < ths.length; i++) {
                headers.push(csvEscape(ths[i].textContent));
            }

            var lines = [headers.join(',')];
            var rows = table.querySelectorAll('tbody tr');
            for (var r = 0; r < rows.length; r++) {
                var cells = [];
                var inputs = rows[r].querySelectorAll('td input');
                for (var c = 0; c < inputs.length; c++) {
                    cells.push(csvEscape(inputs[c].value));
                }
                lines.push(cells.join(','));
            }

            copyText(btn, lines.join('\n') + '\n');
        };

        // Append an empty row to the samplesheet table.
        window.addSamplesheetRow = function() {
            var table = document.getElementById('samplesheet-table');
            if (!table) return;
            var colCount = table.querySelectorAll('thead th:not(.col-actions)').length;
            var tbody = table.querySelector('tbody');
            if (!tbody) return;
            snapshotSamplesheet();
            var tr = document.createElement('tr');
            for (var i = 0; i < colCount; i++) {
                var td = document.createElement('td');
                var input = document.createElement('input');
                input.type = 'text';
                input.value = '';
                td.appendChild(input);
                tr.appendChild(td);
            }
            var actionTd = document.createElement('td');
            actionTd.className = 'cell-actions';
            var removeBtn = document.createElement('button');
            removeBtn.className = 'btn-remove-row';
            removeBtn.setAttribute('onclick', 'removeSamplesheetRow(this)');
            removeBtn.setAttribute('title', 'Remove row');
            removeBtn.textContent = '\u00d7';
            actionTd.appendChild(removeBtn);
            tr.appendChild(actionTd);
            tbody.appendChild(tr);
        };
    </script>
</head>
<body>
    <div class="layout"
         data-signals="{tick: 0, expandedGroup: '', expandedTask: 0, selectedRun: '', latestRun: '', _dagHL: ''}"
         data-init="@get('/sse/sidebar')"
         data-on-interval__duration.1s="$tick++">

        <header class="app-header">
            <span class="app-logo">⬡</span>
            <span>nextflow-monitor</span>
        </header>

        <aside class="sidebar">
            <div class="sidebar-label">Runs</div>
            <div id="run-list"></div>
        </aside>

        <main class="main-panel">
            <div id="run-selector" style="display:none"></div>
            <div id="dashboard">
                <p class="waiting">Waiting for pipeline events...</p>
            </div>

        </main>
    </div>
</body>
</html>
